services:
  # Nuestro server de python
  llm_attorney:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: llm_attorney
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - ollama-docker

  ollama:
    image: docker.io/ollama/ollama:latest
    ports:
      - 7869:11434
    volumes:
      - .:/code
      - ./ollama/ollama:/root/.ollama
    container_name: 
      ollama
    pull_policy: 
      always
    tty: 
      true
    restart: 
      always
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    networks:
      - ollama-docker

networks:
  ollama-docker:

volumes:
  ollama_storage: